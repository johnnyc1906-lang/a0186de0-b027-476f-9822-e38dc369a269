<style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --gold: #ffb84d; --gold-light: #ffe69a; --dark: #f7dc9b; --dark2: #f9e7bf; --dark3: #fbf1d8; --red: #ff5a4d; --text: #121212; --text-muted: #6b6b66; --border: rgba(255,184,77,0.20); } html { scroll-behavior: smooth; } body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; line-height: 1.6; } /* ===== NAVBAR ===== */ nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 0 5%; height: 72px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 6px 18px rgba(18,18,18,0.05); } .nav-logo { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 3vw, 1.7rem); font-weight: 900; color: var(--gold); letter-spacing: 2px; text-decoration: none; } .nav-logo span { color: var(--text); } .nav-links { display: flex; align-items: center; gap: clamp(16px, 2.5vw, 32px); list-style: none; } .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.82rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.3s; } .nav-links a:hover { color: var(--gold); } .nav-cta { background: var(--gold); color: var(--text) !important; padding: 10px 20px; border-radius: 4px; font-weight: 700 !important; transition: background 0.3s !important; } .nav-cta:hover { background: var(--gold-light) !important; color: var(--text) !important; } .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 6px; } .hamburger span { width: 26px; height: 2px; background: var(--gold); display: block; transition: all 0.3s; } .mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(12px); padding: -height: 52px; display: inline-flex; align-items: center; } .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.4); } .btn-outline { background: transparent; color: #fff; text-decoration: none; padding: 16px 36px; border-radius: 4px; font-weight: 700; font-size: 0.88rem; letter-spacing: 1.5px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.5); transition: all 0.3s; min-height: 52px; display: inline-flex; align-items: center; } .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); } .hero-stars
